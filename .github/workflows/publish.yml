name: Publish (manual)

# Manual production publish. Trigger from the Actions tab ("Run workflow").
# Gated on the Test and Audit workflows passing, then publishes to npm and cuts
# a GitHub Release with a version tag.

on:
  workflow_dispatch:
    inputs:
      dist-tag:
        description: 'npm dist-tag to publish under'
        required: true
        default: 'latest'

# Prevent overlapping publishes.
concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  test:
    uses: ./.github/workflows/test.yml

  audit:
    uses: ./.github/workflows/audit.yml

  publish:
    needs: [test, audit]
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to create the release + tag
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install

      - name: Build (CJS + ESM)
        run: npm run build

      - name: Final test guard
        run: npm test

      - name: Read package version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Verify tag does not already exist
        run: |
          if git rev-parse "v${{ steps.pkg.outputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag v${{ steps.pkg.outputs.version }} already exists. Bump the version first."
            exit 1
          fi

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --tag "${{ github.event.inputs.dist-tag }}"

      # Tag is derived from the package.json version (v<version>); the release
      # notes are auto-generated by GitHub from the merged PR titles/descriptions
      # and commits since the previous release tag.
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.pkg.outputs.version }}" \
            --title "v${{ steps.pkg.outputs.version }}" \
            --generate-notes \
            --target "${{ github.sha }}"
